# Render blueprint — FastAPI backend + managed Postgres.
# In Render: New → Blueprint → connect this repo. Render provisions both and gives the API
# a stable URL (e.g. https://amadoo-api.onrender.com). Free tier sleeps when idle (~50s
# cold start). Frankfurt region = closest free region to Lebanon.
databases:
  - name: amadoo-db
    databaseName: amadoo
    plan: free
    region: frankfurt

services:
  - type: web
    name: amadoo-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # init_db creates tables + seeds ONCE (only when empty), then the server starts.
    startCommand: python init_db.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: amadoo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong secret
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: BASE_URL
        sync: false                # set to the service URL after the first deploy
