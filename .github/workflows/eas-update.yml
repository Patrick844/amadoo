name: Publish OTA update

# Every push to main ships a JS/asset OTA update to the "main" branch on EAS, which your
# installed build picks up on next launch. The API URL is injected from a repo secret so
# the published bundle points at your hosted backend (no ngrok).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   EXPO_TOKEN           — an access token from https://expo.dev/accounts/[you]/settings/access-tokens
#   EXPO_PUBLIC_API_URL  — your stable backend URL, e.g. https://amadoo-api.onrender.com
#
# Native changes (new packages with native code, e.g. react-native-maps) still need a
# fresh `eas build` — OTA only ships JS/assets.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Publish EAS Update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          bunx eas-cli@latest update \
            --branch main \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
